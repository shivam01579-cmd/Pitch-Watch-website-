name: Cricket YouTube Script Generator

on:
  schedule:
    # 9:00 AM IST (3:30 AM UTC)
    - cron: '30 3 * * *'
    # 6:00 PM IST (12:30 PM UTC)
    - cron: '30 12 * * *'
  workflow_dispatch: # Enable manual run from GitHub UI

jobs:
  generate-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: cricket-script-generator/package-lock.json

      - name: Install Dependencies
        working-directory: cricket-script-generator
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Run Script Generator
        working-directory: cricket-script-generator
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_SCRIPT_GROUP_ID: ${{ secrets.TELEGRAM_SCRIPT_GROUP_ID }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
        run: npm run generate
