name: "🏏 Pitch Watch — Auto Post (Prime Times)"

on:
  schedule:
    # 7:00 AM IST (01:30 UTC)
    - cron: '30 1 * * *'
    # 11:55 PM IST (18:25 UTC)
    - cron: '25 18 * * *'
  workflow_dispatch:

jobs:
  run-auto-poster:
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: blogger-automation/package-lock.json

      - name: Install Dependencies
        run: cd blogger-automation && npm ci

      - name: Restore Google OAuth tokens
        run: |
          cd blogger-automation
          echo '${{ secrets.TOKENS_JSON }}' > tokens.json
          echo "[Setup] tokens.json restored."

      - name: Run Workflow (Discover + Post + Telegram)
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REDIRECT_URI: ${{ secrets.GOOGLE_REDIRECT_URI }}
          BLOG_ID: ${{ secrets.BLOG_ID }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          YOUTUBE_HANDLE: ${{ secrets.YOUTUBE_HANDLE }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          FACEBOOK_PAGE_ACCESS_TOKEN: ${{ secrets.FACEBOOK_PAGE_ACCESS_TOKEN }}
          FACEBOOK_PAGE_URL: ${{ secrets.FACEBOOK_PAGE_URL }}
          FACEBOOK_GROUPS: ${{ secrets.FACEBOOK_GROUPS }}
        run: cd blogger-automation && node workflow.js


      - name: Upload share-assistant as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: share-assistant-${{ github.run_number }}
          path: blogger-automation/share-assistant.html
          if-no-files-found: ignore
          retention-days: 3
