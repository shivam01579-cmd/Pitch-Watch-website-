name: "🏏 Pitch Watch — Auto Post (Every 30 Min)"

on:
  schedule:
    # Every 30 minutes, 24x7, cloud pe — no PC needed!
    - cron: '*/30 * * * *'
  workflow_dispatch: # Manual trigger from GitHub Actions tab

jobs:
  run-auto-poster:
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: blogger-automation/package-lock.json

      - name: Install Dependencies
        run: |
          cd blogger-automation
          npm ci

      - name: Restore Google OAuth tokens
        run: |
          cd blogger-automation
          echo '${{ secrets.TOKENS_JSON }}' > tokens.json
          echo "[Setup] tokens.json restored from GitHub Secret."

      - name: Run Discover + Post Workflow
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REDIRECT_URI: ${{ secrets.GOOGLE_REDIRECT_URI }}
          BLOG_ID: ${{ secrets.BLOG_ID }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          YOUTUBE_HANDLE: ${{ secrets.YOUTUBE_HANDLE }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          FACEBOOK_PAGE_ACCESS_TOKEN: ${{ secrets.FACEBOOK_PAGE_ACCESS_TOKEN }}
          FACEBOOK_PAGE_URL: ${{ secrets.FACEBOOK_PAGE_URL }}
          FACEBOOK_GROUPS: ${{ secrets.FACEBOOK_GROUPS }}
        run: |
          cd blogger-automation
          node workflow.js
          echo "[Done] Workflow run complete."

      - name: Upload share-assistant.html as artifact (optional debug)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: share-assistant-${{ github.run_number }}
          path: blogger-automation/share-assistant.html
          if-no-files-found: ignore
          retention-days: 3
